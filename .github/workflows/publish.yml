name: Publish to PyPI

# Publica en PyPI mediante Trusted Publishing (OIDC): no hacen falta tokens.
# Requiere un "publisher" configurado en PyPI con:
#   proyecto: captionwave | owner: Fortex-GT | repo: Captionwave
#   workflow: publish.yml  | environment: pypi
# Se dispara al publicar una Release en GitHub.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # imprescindible para Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tests
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[duration,test]"
          pytest -q
      - name: Construir wheel + sdist
        run: |
          pip install --upgrade build
          python -m build
      - name: Publicar en PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
